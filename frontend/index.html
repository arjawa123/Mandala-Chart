<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mandala Chart - Perencana Tujuan</title>
  <meta name="description" content="Alat perencana tujuan Mandala Chart profesional dengan asisten AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body>

  <!-- ── HEADER ── -->
  <header id="app-header">
    <div class="header-left">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="0" y="0" width="6" height="6" rx="1" fill="currentColor" opacity="0.4" />
          <rect x="7" y="0" width="6" height="6" rx="1" fill="currentColor" opacity="0.7" />
          <rect x="14" y="0" width="6" height="6" rx="1" fill="currentColor" opacity="0.4" />
          <rect x="0" y="7" width="6" height="6" rx="1" fill="currentColor" opacity="0.7" />
          <rect x="7" y="7" width="6" height="6" rx="1" fill="currentColor" />
          <rect x="14" y="7" width="6" height="6" rx="1" fill="currentColor" opacity="0.7" />
          <rect x="0" y="14" width="6" height="6" rx="1" fill="currentColor" opacity="0.4" />
          <rect x="7" y="14" width="6" height="6" rx="1" fill="currentColor" opacity="0.7" />
          <rect x="14" y="14" width="6" height="6" rx="1" fill="currentColor" opacity="0.4" />
        </svg>
      </div>
      <span class="app-title">Mandala Chart</span>
      <div class="divider-v"></div>
      <input id="project-name" type="text" class="project-name-input" placeholder="Proyek Tanpa Nama" maxlength="60" />
    </div>

    <nav id="breadcrumb" class="breadcrumb"></nav>

    <div class="header-right">
      <button id="btn-undo" class="hbtn" title="Undo (Ctrl+Z)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7v6h6" />
          <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" />
        </svg>
      </button>
      <button id="btn-redo" class="hbtn" title="Redo (Ctrl+Y)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 7v6h-6" />
          <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13" />
        </svg>
      </button>
      <div class="divider-v"></div>
      <button id="btn-zoom-out" class="hbtn" title="Zoom Out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
      </button>
      <span id="zoom-label" class="zoom-label">100%</span>
      <button id="btn-zoom-in" class="hbtn" title="Zoom In">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
          <line x1="11" y1="8" x2="11" y2="14" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
      </button>
      <button id="btn-zoom-reset" class="hbtn" title="Reset Tampilan">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
        </svg>
        <span>Pas</span>
      </button>

      <div class="divider-v"></div>

      <button id="btn-focus" class="hbtn" title="Mode Fokus">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M3 7V5a2 2 0 0 1 2-2h2" />
          <path d="M17 3h2a2 2 0 0 1 2 2v2" />
          <path d="M21 17v2a2 2 0 0 1-2 2h-2" />
          <path d="M7 21H5a2 2 0 0 1-2-2v-2" />
        </svg>
        <span>Fokus</span>
      </button>

      <div class="divider-v"></div>

      <div class="relative">
        <button id="btn-more" class="hbtn" title="Lainnya">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1" />
            <circle cx="12" cy="5" r="1" />
            <circle cx="12" cy="19" r="1" />
          </svg>
        </button>
        <div id="more-menu" class="dropdown-menu hidden">
          <button id="btn-new" class="dropdown-opt">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14" />
            </svg>
            Baru
          </button>
          <button id="btn-open" class="dropdown-opt">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 10s3-3 10-3 10 3 10 3" />
              <path d="M2 14s3 3 10 3 10-3 10-3" />
            </svg>
            Buka Proyek
          </button>
          <button id="btn-template" class="dropdown-opt">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2" />
              <path d="M3 9h18M9 21V9" />
            </svg>
            Template
          </button>
          <div class="divider-h"></div>
          <div class="dropdown-sub-title">Ekspor</div>
          <button class="export-opt dropdown-opt" data-format="png">Gambar PNG</button>
          <button class="export-opt dropdown-opt" data-format="pdf">Dokumen PDF</button>
          <button class="export-opt dropdown-opt" data-format="markdown">Markdown (.md)</button>
          <button class="export-opt dropdown-opt" data-format="json">File JSON</button>
        </div>
      </div>

      <button id="btn-save" class="hbtn-primary" title="Simpan Proyek">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
        <span>Simpan</span>
      </button>

      <div class="divider-v"></div>

      <button id="btn-ai-toggle" class="hbtn-ai" title="Toggle AI Panel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="m12 3-1.912 5.813a2.007 2.007 0 0 1-1.275 1.275L3 12l5.813 1.912a2.007 2.007 0 0 1 1.275 1.275L12 21l1.912-5.813a2.007 2.007 0 0 1 1.275-1.275L21 12l-5.813-1.912a2.007 2.007 0 0 1-1.275-1.275L12 3Z" />
          <path d="m5 3 1 1" />
          <path d="m19 21 1 1" />
          <path d="m5 21 1-1" />
          <path d="m19 3 1-1" />
        </svg>
        <span>AI</span>
      </button>
    </div>
  </header>

  <!-- ── MAIN LAYOUT ── -->
  <div id="app-body">

    <!-- Canvas -->
    <main id="canvas-wrap">
      <div id="canvas-inner">
        <div id="grid-container"></div>
      </div>

      <!-- Floating hint -->
      <div id="canvas-hint">
        Klik untuk mengedit &nbsp;·&nbsp; Klik ganda untuk memperluas &nbsp;·&nbsp; Scroll untuk zoom &nbsp;·&nbsp;
        Geser untuk memindahkan canvas
      </div>
    </main>

    <!-- AI Sidebar -->
    <aside id="ai-panel">
      <div class="ai-panel-header">
        <div class="ai-panel-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10" />
            <path d="M12 12l8-8" />
            <path d="M16 4h4v4" />
          </svg>
          Asisten AI
        </div>
        <span id="ai-status-badge" class="ai-badge">siap</span>
      </div>

      <div class="ai-context-box">
        <span class="ai-context-label">Terpilih:</span>
        <span id="ai-context-label" class="ai-context-value">—</span>
      </div>

      <div class="ai-actions">
        <button id="btn-ai-pillars" class="ai-action-btn color-blue">
          <span class="ai-btn-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
            </svg>
          </span>
          Buat 8 Pilar
        </button>
        <button id="btn-ai-breakdown" class="ai-action-btn color-green">
          <span class="ai-btn-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="21" y1="10" x2="7" y2="10" />
              <line x1="21" y1="6" x2="3" y2="6" />
              <line x1="21" y1="14" x2="3" y2="14" />
              <line x1="21" y1="18" x2="7" y2="18" />
            </svg>
          </span>
          Rincikan dengan AI
        </button>
        <button id="btn-ai-improve" class="ai-action-btn color-purple">
          <span class="ai-btn-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
          </span>
          Perbaiki dengan AI
        </button>
        <button id="btn-ai-smart" class="ai-action-btn color-orange">
          <span class="ai-btn-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4" />
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
            </svg>
          </span>
          Buat Versi SMART
        </button>
      </div>

      <div class="ai-history-section">
        <div class="ai-history-label">Riwayat</div>
        <div id="ai-history">
          <p class="ai-history-empty">Belum ada riwayat AI.</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast-container"></div>

  <!-- ── MODALS ── -->

  <!-- Template Modal -->
  <div id="template-modal" class="modal-backdrop hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Pilih Template</h2>
        <button id="template-modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="template-list" class="template-grid"></div>
      </div>
    </div>
  </div>

  <!-- Projects Modal -->
  <div id="projects-modal" class="modal-backdrop hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Buka Proyek</h2>
        <button id="projects-modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="projects-list" class="projects-list"></div>
      </div>
    </div>
  </div>

  <!-- AI Result Modal -->
  <div id="ai-result-modal" class="modal-backdrop hidden">
    <div class="modal-box modal-sm">
      <div class="modal-header">
        <h2 id="ai-result-title">Hasil AI</h2>
        <button id="ai-result-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="ai-result-content" class="ai-result-content"></div>
        <div class="modal-actions">
          <button id="ai-result-dismiss" class="hbtn">Tutup</button>
          <button id="ai-result-apply" class="hbtn-primary">Terapkan</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
